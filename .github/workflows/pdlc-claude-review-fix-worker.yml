name: PDLC Claude Review Fix Worker

on:
  issue_comment:
    types:
      - created
  pull_request_review_comment:
    types:
      - created
  pull_request_review:
    types:
      - submitted

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  local-claude-review-fix:
    name: Run local Claude Code review-fix worker
    runs-on:
      - self-hosted
      - Windows
      - X64
      - pdlc-worker
    if: >
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '/fix-review')) ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '/fix-review')) ||
      (github.event_name == 'pull_request_review' &&
       contains(github.event.review.body, '/fix-review'))

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Verify local tools
        shell: pwsh
        run: |
          git --version
          gh --version
          node --version
          claude --version

      - name: Run local Claude Code review-fix worker
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PDLC_CLAUDE_MODEL: ${{ vars.PDLC_CLAUDE_MODEL || 'sonnet' }}
          PDLC_CLAUDE_REVIEW_MAX_BUDGET_USD: ${{ vars.PDLC_CLAUDE_REVIEW_MAX_BUDGET_USD || '2' }}
        run: |
          .\.github\scripts\pdlc-local-claude-review-fix-worker.ps1 `
            -Repository "${{ github.repository }}" `
            -EventPath "${{ github.event_path }}" `
            -RunId "${{ github.run_id }}"
