name: PDLC Agent Coding

on:
  issue_comment:
    types:
      - created

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  code-from-approved-analysis:
    name: Create branch and PR after analysis approval
    runs-on: ubuntu-latest
    if: >
      github.event.issue.pull_request == null &&
      github.event.comment.body == '/approve analysis'

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Prepare agent changes
        id: prepare
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node .github/scripts/pdlc-agent-code.mjs

      - name: Commit and push branch
        env:
          BRANCH_NAME: ${{ steps.prepare.outputs.branch }}
          COMMIT_MESSAGE: ${{ steps.prepare.outputs.commit_message }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH_NAME"
          git add pdlc-runs sample-app/docs
          git commit -m "$COMMIT_MESSAGE"
          git push -u origin "$BRANCH_NAME"

      - name: Create pull request
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ steps.prepare.outputs.pr_title }}
          BRANCH_NAME: ${{ steps.prepare.outputs.branch }}
        run: |
          pr_url="$(gh pr create --title "$PR_TITLE" --body-file .pdlc-pr-body.md --head "$BRANCH_NAME" --base "${{ github.event.repository.default_branch }}")"
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Comment PR link on issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.create_pr.outputs.pr_url }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "Coding agent created pull request: $PR_URL"
