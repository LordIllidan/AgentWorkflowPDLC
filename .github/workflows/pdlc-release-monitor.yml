name: PDLC Release Monitor

on:
  pull_request:
    types:
      - closed

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  monitor-merged-pr:
    name: Monitor deployment after merged PR
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run release monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: node .github/scripts/pdlc-release-monitor.mjs
