name: PDLC Issue Checklist

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled
      - unlabeled

permissions:
  issues: write
  contents: read

concurrency:
  group: pdlc-issue-checklist-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  update-pdlc-status:
    name: Update PDLC status comment
    runs-on: ubuntu-latest
    if: github.event.issue.pull_request == null

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update issue status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: node .github/scripts/pdlc-issue-checklist.mjs

