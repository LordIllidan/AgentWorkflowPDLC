name: PDLC Stage Agents

on:
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write

jobs:
  run-stage-agent:
    name: Run local Claude Code PDLC stage agent
    runs-on:
      - self-hosted
      - Windows
      - X64
      - pdlc-worker
    if: >
      github.event.issue.pull_request == null &&
      (startsWith(github.event.comment.body, '/pdlc research') ||
       startsWith(github.event.comment.body, '/pdlc analyze') ||
       startsWith(github.event.comment.body, '/pdlc risk') ||
       startsWith(github.event.comment.body, '/pdlc architecture') ||
       startsWith(github.event.comment.body, '/pdlc plan'))

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Verify local tools
        shell: pwsh
        run: |
          git --version
          gh --version
          claude --version

      - name: Run local Claude Code stage worker
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PDLC_CLAUDE_MODEL: ${{ vars.PDLC_CLAUDE_MODEL || 'sonnet' }}
          PDLC_CLAUDE_STAGE_MAX_BUDGET_USD: ${{ vars.PDLC_CLAUDE_STAGE_MAX_BUDGET_USD || vars.PDLC_CLAUDE_MAX_BUDGET_USD || '2' }}
          PDLC_AGENT_CONFIG_REPO: ${{ vars.PDLC_AGENT_CONFIG_REPO || 'LordIllidan/AgentWorkflowPDLC-AgentConfig' }}
          PDLC_AGENT_CONFIG_REF: ${{ vars.PDLC_AGENT_CONFIG_REF || 'main' }}
        run: |
          .\.github\scripts\pdlc-local-claude-stage-worker.ps1 `
            -Repository "${{ github.repository }}" `
            -EventPath "${{ github.event_path }}" `
            -RunId "${{ github.run_id }}"
