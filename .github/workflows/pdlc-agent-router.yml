name: PDLC Agent Router

on:
  push:
    branches:
      - main
  issues:
    types:
      - opened
      - edited
      - reopened
  issue_comment:
    types:
      - created
  pull_request_review_comment:
    types:
      - created
  pull_request_review:
    types:
      - submitted
  repository_dispatch:
    types:
      - pdlc_issue_created
      - pdlc_stage_command
  workflow_dispatch:
    inputs:
      issue_number:
        description: Source issue number
        required: true
      command:
        description: PDLC command to execute
        required: true

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: pdlc-agent-router-${{ github.event.issue.number || github.event.pull_request.number || github.event.client_payload.issue_number || github.event.inputs.issue_number || github.event.head_commit.id || github.run_id }}
  cancel-in-progress: false

jobs:
  route:
    name: Decide PDLC agent route
    runs-on: ubuntu-latest
    outputs:
      riskAssessment: ${{ steps.route.outputs.riskAssessment }}
      stage: ${{ steps.route.outputs.stage }}
      localCoding: ${{ steps.route.outputs.localCoding }}
      reviewFix: ${{ steps.route.outputs.reviewFix }}
      issueNumber: ${{ steps.route.outputs.issueNumber }}
      reason: ${{ steps.route.outputs.reason }}

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Route event
        id: route
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: node .github/scripts/pdlc-agent-router.mjs

  risk-assessment:
    name: Run initial autonomy risk assessment
    needs: route
    if: needs.route.outputs.riskAssessment == 'true'
    runs-on:
      - self-hosted
      - Windows
      - X64
      - pdlc-worker

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Verify local tools
        shell: pwsh
        run: |
          git --version
          gh --version
          claude --version

      - name: Run local Claude Code risk worker
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PDLC_CLAUDE_MODEL: ${{ vars.PDLC_CLAUDE_MODEL || 'sonnet' }}
          PDLC_CLAUDE_STAGE_MAX_BUDGET_USD: ${{ vars.PDLC_CLAUDE_STAGE_MAX_BUDGET_USD || vars.PDLC_CLAUDE_MAX_BUDGET_USD || '5' }}
          PDLC_AGENT_CONFIG_REPO: ${{ vars.PDLC_AGENT_CONFIG_REPO || 'LordIllidan/AgentWorkflowPDLC-AgentConfig' }}
          PDLC_AGENT_CONFIG_REF: ${{ vars.PDLC_AGENT_CONFIG_REF || 'main' }}
        run: |
          .\.github\scripts\pdlc-local-claude-stage-worker.ps1 `
            -Repository "${{ github.repository }}" `
            -EventPath "${{ github.event_path }}" `
            -RunId "${{ github.run_id }}"

  stage-agent:
    name: Run local Claude Code stage agent
    needs: route
    if: needs.route.outputs.stage == 'true'
    runs-on:
      - self-hosted
      - Windows
      - X64
      - pdlc-worker

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Verify local tools
        shell: pwsh
        run: |
          git --version
          gh --version
          claude --version

      - name: Run local Claude Code stage worker
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PDLC_CLAUDE_MODEL: ${{ vars.PDLC_CLAUDE_MODEL || 'sonnet' }}
          PDLC_CLAUDE_STAGE_MAX_BUDGET_USD: ${{ vars.PDLC_CLAUDE_STAGE_MAX_BUDGET_USD || vars.PDLC_CLAUDE_MAX_BUDGET_USD || '5' }}
          PDLC_AGENT_CONFIG_REPO: ${{ vars.PDLC_AGENT_CONFIG_REPO || 'LordIllidan/AgentWorkflowPDLC-AgentConfig' }}
          PDLC_AGENT_CONFIG_REF: ${{ vars.PDLC_AGENT_CONFIG_REF || 'main' }}
        run: |
          .\.github\scripts\pdlc-local-claude-stage-worker.ps1 `
            -Repository "${{ github.repository }}" `
            -EventPath "${{ github.event_path }}" `
            -RunId "${{ github.run_id }}"

  local-coding:
    name: Run local Claude Code coding worker
    needs: route
    if: needs.route.outputs.localCoding == 'true'
    runs-on:
      - self-hosted
      - Windows
      - X64
      - pdlc-worker

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Verify local tools
        shell: pwsh
        run: |
          git --version
          gh --version
          node --version
          claude --version

      - name: Run local Claude Code worker
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PDLC_CLAUDE_MODEL: ${{ vars.PDLC_CLAUDE_MODEL || 'sonnet' }}
          PDLC_CLAUDE_MAX_BUDGET_USD: ${{ vars.PDLC_CLAUDE_MAX_BUDGET_USD || '3' }}
          PDLC_AGENT_CONFIG_REPO: ${{ vars.PDLC_AGENT_CONFIG_REPO || 'LordIllidan/AgentWorkflowPDLC-AgentConfig' }}
          PDLC_AGENT_CONFIG_REF: ${{ vars.PDLC_AGENT_CONFIG_REF || 'main' }}
        run: |
          .\.github\scripts\pdlc-local-claude-worker.ps1 `
            -IssueNumber ${{ needs.route.outputs.issueNumber || github.event.issue.number || github.event.client_payload.issue_number || github.event.inputs.issue_number }} `
            -Repository "${{ github.repository }}" `
            -BaseBranch "${{ github.event.repository.default_branch }}" `
            -RunId "${{ github.run_id }}"

  review-fix:
    name: Run local Claude Code review-fix worker
    needs: route
    if: needs.route.outputs.reviewFix == 'true'
    runs-on:
      - self-hosted
      - Windows
      - X64
      - pdlc-worker

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Verify local tools
        shell: pwsh
        run: |
          git --version
          gh --version
          node --version
          claude --version

      - name: Run local Claude Code review-fix worker
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PDLC_CLAUDE_MODEL: ${{ vars.PDLC_CLAUDE_MODEL || 'sonnet' }}
          PDLC_CLAUDE_REVIEW_MAX_BUDGET_USD: ${{ vars.PDLC_CLAUDE_REVIEW_MAX_BUDGET_USD || '2' }}
          PDLC_AGENT_CONFIG_REPO: ${{ vars.PDLC_AGENT_CONFIG_REPO || 'LordIllidan/AgentWorkflowPDLC-AgentConfig' }}
          PDLC_AGENT_CONFIG_REF: ${{ vars.PDLC_AGENT_CONFIG_REF || 'main' }}
        run: |
          .\.github\scripts\pdlc-local-claude-review-fix-worker.ps1 `
            -Repository "${{ github.repository }}" `
            -EventPath "${{ github.event_path }}" `
            -RunId "${{ github.run_id }}"
