services:
  dotnet-api:
    build:
      context: ../dotnet-api
    ports:
      - "5080:8080"

  java-api:
    build:
      context: ../java-api
    ports:
      - "8081:8080"

  angular-frontend:
    build:
      context: ../angular-frontend
    ports:
      - "4200:80"
    depends_on:
      - dotnet-api
      - java-api

